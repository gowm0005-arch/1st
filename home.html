<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Explorer</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#ff5722;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.menu{
cursor:pointer;
font-size:24px;
}

.dropdown{
display:none;
position:absolute;
right:10px;
top:60px;
background:white;
border:1px solid #ccc;
border-radius:5px;
}

.dropdown button{
display:block;
width:120px;
padding:10px;
border:none;
background:white;
cursor:pointer;
}

.container{
padding:20px;
}

.upload-box{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

.feed{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
position:relative;
}

.card img{
width:100%;
border-radius:5px;
}

.delete-btn{
position:absolute;
top:5px;
right:5px;
background:red;
color:white;
border:none;
cursor:pointer;
padding:5px;
border-radius:3px;
}

#map{
height:300px;
margin-top:10px;
border-radius:10px;
}

.logout{
background:black;
color:white;
border:none;
padding:8px;
cursor:pointer;
border-radius:5px;
}

</style>
</head>

<body>

<header>

<h2>Food Explorer</h2>

<div>
<button class="logout" onclick="logout()">Logout</button>
<span class="menu" onclick="toggleMenu()">⋮</span>
</div>

<div class="dropdown" id="menu">

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>

</div>

</header>


<div class="container">

<div class="upload-box">

<h3>Upload Food</h3>

<<input type="file" id="imageInput">
<br><br>

<button onclick="uploadImage()">Upload Image</button>

<button onclick="postImage()" style="margin-left:10px;background:#4CAF50;color:white;border:none;padding:8px;border-radius:5px;">
Post
</button>

<div id="map"></div>

</div>


<h3>Food Feed</h3>

<div class="feed" id="feed"></div>

</div>


<script>

function toggleMenu(){
let menu=document.getElementById("menu");
menu.style.display=menu.style.display=="block"?"none":"block";
}

function login(){
alert("Login page coming soon");
}

function signup(){
alert("Signup page coming soon");
}

function logout(){
alert("Logged out");
}

let map;
let marker;

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
center:{lat:20.5937,lng:78.9629},
zoom:5
});

map.addListener("click",function(event){

if(marker){
marker.setMap(null);
}

marker=new google.maps.Marker({
position:event.latLng,
map:map
});

});

}


function uploadImage(){

let file=document.getElementById("imageInput").files[0];

let formData=new FormData();

formData.append("file",file);
formData.append("upload_preset","food_upload");

fetch("https://api.cloudinary.com/v1_1/dzlwlp2fx/image/upload",{
method:"POST",
body:formData
})
.then(res=>res.json())
.then(data=>{

addPost(data.secure_url);

});

}

function addPost(imageUrl){

let feed=document.getElementById("feed");

let card=document.createElement("div");
card.className="card";

let img=document.createElement("img");
img.src=imageUrl;

let del=document.createElement("button");
del.innerText="X";
del.className="delete-btn";

del.onclick=function(){
card.remove();
};

card.appendChild(img);
card.appendChild(del);

feed.appendChild(card);

}
let uploadedImage = "";

function uploadImage(){

let file = document.getElementById("imageInput").files[0];

let formData = new FormData();

formData.append("file", file);
formData.append("upload_preset", "UPLOAD_PRESET");

fetch("https://api.cloudinary.com/v1_1/dzlwlp2fx/image/upload",{
method:"POST",
body:formData
})
.then(res=>res.json())
.then(data=>{

uploadedImage = data.secure_url;

alert("Image uploaded! Now press POST");

});

}

function postImage(){

if(uploadedImage==""){
alert("Upload image first");
return;
}

addPost(uploadedImage);

uploadedImage="";

}
</script>


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAwNCJX2U1Q_4tqA_ip2FJYUYI5Kyesmls&callback=initMap" async defer></script>


</body>
</html>
