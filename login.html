<!DOCTYPE html>
<html>

<head>

    <title>Login - Food Explorer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #ff5722, #ff9800);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Login Card */

        .login-box {
            background: white;
            width: 360px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        /* Logo */

        .logo {
            font-size: 30px;
            margin-bottom: 10px;
        }

        /* Title */

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        /* Inputs */

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #ff5722;
        }

        /* Button */

        button {
            width: 95%;
            padding: 12px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e64a19;
        }

        /* Signup link */

        .link {
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: #ff5722;
            text-decoration: none;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="login-box">

        <div class="logo">🍔</div>

        <h2>Food Explorer Login</h2>

        <input type="email" id="email" placeholder="Enter Email">

        <input type="password" id="password" placeholder="Enter Password">

        <br><br>

        <button onclick="loginUser()">Login</button>

        <div class="link">
            Don't have an account?
            <a href="signup.html">Signup</a>
        </div>

    </div>


    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import { getAuth, signInWithEmailAndPassword }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


        const firebaseConfig = {
            apiKey: "AIzaSyAqMWOE_uR6AUX9u-g9QybNPeLE8B361aM",
            authDomain: "food-explorer-fc408.firebaseapp.com",
            projectId: "food-explorer-fc408",
            storageBucket: "food-explorer-fc408.appspot.com",
            messagingSenderId: "247217642461",
            appId: "1:247217642461:web:000b3cd0d31c8bcf1eb434"
        };

        const app = initializeApp(firebaseConfig);

        const auth = getAuth(app);


        /* Login Function */

        window.loginUser = function () {

            const email = document.getElementById("email").value;

            const password = document.getElementById("password").value;

            signInWithEmailAndPassword(auth, email, password)

                .then(() => {

                    alert("Login Successful");

                    window.location.href = "home.html";

                })

                .catch((error) => {

                    alert(error.message);

                });

        }

    </script>

</body>

</html>
